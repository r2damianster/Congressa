<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIPP 2026 · V2 SaaS — Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0; padding: 0; background: #fafaf9;
      font-family: 'Geist', -apple-system, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    code, pre, [style*="monospace"] { font-family: 'Geist Mono', ui-monospace, monospace !important; }
    * { box-sizing: border-box; }
    #root { width: 1360px; }

    @page {
      size: 1360px 3800px;
      margin: 0;
    }
    @media print {
      html, body {
        width: 1360px;
        background: #fafaf9;
      }
      #root {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      button { box-shadow: none !important; }
      * { transition: none !important; animation: none !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="../variants/shared-content.jsx"></script>
  <script type="text/babel" src="../variants/v2-saas.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<V2 lang="es" primary="#0a0a0a" />);

    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 800));

      const h = Math.ceil(document.getElementById('root').getBoundingClientRect().height);
      const style = document.createElement('style');
      style.textContent = `@page { size: 1360px ${h}px; margin: 0; }`;
      document.head.appendChild(style);

      await new Promise(r => setTimeout(r, 200));
      window.print();
    })();
  </script>
</body>
</html>
