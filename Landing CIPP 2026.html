<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Landing CIPP 2026 · 3 variaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Geist', -apple-system, sans-serif; }
    /* Use Geist Mono where we request monospace. */
    code, pre, [style*="monospace"] { font-family: 'Geist Mono', ui-monospace, monospace !important; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="variants/shared-content.jsx"></script>
  <script type="text/babel" src="variants/v1-editorial.jsx"></script>
  <script type="text/babel" src="variants/v2-saas.jsx"></script>
  <script type="text/babel" src="variants/v3-dense.jsx"></script>

  <script type="text/babel">
    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "primary_v1": "#1e3a8a",
      "primary_v2": "#0a0a0a",
      "primary_v3": "#b1361e",
      "lang": "es"
    }/*EDITMODE-END*/;

    const App = () => {
      const [tw, setTw] = useTweaks(DEFAULTS);
      const { DesignCanvas, DCSection, DCArtboard } = window;

      return (
        <>
          <DesignCanvas
            title="I Congreso Internacional de Pedagogía y Psicodidáctica"
            subtitle="Landing page · 3 direcciones visuales · Plataforma Congressa"
          >
            <DCSection id="landing" title="Landing page · 3 variaciones">
              <DCArtboard id="v1" label="01 · Editorial académico — serif, azul tinta, tono revista" width={1280} height={3600}>
                <V1 lang={tw.lang} primary={tw.primary_v1} />
              </DCArtboard>
              <DCArtboard id="v2" label="02 · SaaS moderno — neutro cálido, sombras sutiles, product card" width={1360} height={3800}>
                <V2 lang={tw.lang} primary={tw.primary_v2} />
              </DCArtboard>
              <DCArtboard id="v3" label="03 · Denso informativo — dashboard público, monoespaciada, data-first" width={1400} height={4200}>
                <V3 lang={tw.lang} primary={tw.primary_v3} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Idioma">
              <TweakRadio
                label="Idioma de la UI"
                value={tw.lang}
                onChange={(v) => setTw({ lang: v })}
                options={[
                  { value: "es", label: "Español" },
                  { value: "en", label: "English" },
                ]}
              />
            </TweakSection>

            <TweakSection title="Color primario por variación">
              <TweakColor
                label="V1 · Editorial"
                value={tw.primary_v1}
                onChange={(v) => setTw({ primary_v1: v })}
                presets={["#1e3a8a", "#7c2d12", "#14532d", "#581c87", "#0f172a"]}
              />
              <TweakColor
                label="V2 · SaaS"
                value={tw.primary_v2}
                onChange={(v) => setTw({ primary_v2: v })}
                presets={["#0a0a0a", "#2563eb", "#16a34a", "#9333ea", "#e11d48"]}
              />
              <TweakColor
                label="V3 · Denso"
                value={tw.primary_v3}
                onChange={(v) => setTw({ primary_v3: v })}
                presets={["#b1361e", "#d97706", "#047857", "#1d4ed8", "#0f0f0f"]}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
